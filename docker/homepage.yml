---
- name: Homepage
  vars:
    service: "homepage"
    labels:
      - key: "traefik.enable"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.rule"
        value: "Host(`{{ service }}.{{ DOMAIN }}`)"
      - key: "traefik.http.routers.{{ service }}.service"
        value: "{{ service }}"
      - key: "traefik.http.routers.{{ service }}.entrypoints"
        value: "https"
      - key: "traefik.http.routers.{{ service }}.middlewares"
        value: "authelia"
      - key: "traefik.http.routers.{{ service }}.tls"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.tls.certresolver"
        value: "letsencrypt"
      - key: "traefik.http.services.{{ service }}.loadbalancer.server.port"
        value: "3000"

  hosts: all
  become: true
  vars_files:
    - ../vars/vars.yml
    - ../vars/vault.yml

  tasks:
    - name: Read *arr service configs to extract API keys
      ansible.builtin.slurp:
        src: "{{ docker_config_dir }}/{{ item }}/config.xml"
      register: arr_configs
      ignore_errors: true
      loop:
        - sonarr
        - radarr
        - lidarr
        - prowlarr

    - name: Extract *arr API keys from config files
      ansible.builtin.set_fact:
        "{{ item.item }}_apikey": >-
          {{ item.content | b64decode | regex_search('<ApiKey>(.*?)</ApiKey>', '\1') | first }}
      when: item.content is defined
      loop: "{{ arr_configs.results }}"
      loop_control:
        label: "{{ item.item }}"
      no_log: true

    - name: Read Bazarr config to extract API key
      ansible.builtin.slurp:
        src: "{{ docker_config_dir }}/bazarr/config/config.yaml"
      register: bazarr_config
      ignore_errors: true

    - name: Extract Bazarr API key
      ansible.builtin.set_fact:
        bazarr_apikey: >-
          {{ bazarr_config.content | b64decode | regex_search('apikey:\s+(\S+)', '\1') | first }}
      when: bazarr_config.content is defined
      no_log: true

    - name: Copy css and js files
      ansible.builtin.template:
        src: ../local/homepage/{{ item }}
        dest: '{{ docker_config_dir }}/{{ service }}/{{ item }}'
        mode: "0644"
      loop:
        - custom.css
        - custom.js

    - name: Adding yaml files
      ansible.builtin.template:
        src: ../local/homepage/{{ item }}
        dest: '{{ docker_config_dir }}/{{ service }}/{{ item }}'
        mode: "0644"
      loop:
        - services.yaml
        - settings.yaml
        - bookmarks.yaml
        - docker.yaml
        - kubernetes.yaml
        - widgets.yaml

    - name: Start homepage
      community.docker.docker_container:
        image: ghcr.io/gethomepage/homepage:v1.12.3
        name: "{{ service }}"
        env:
          HOMEPAGE_ALLOWED_HOSTS: "{{ service }}.{{ DOMAIN }}"
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/app/config"
          - /var/run/docker.sock:/var/run/docker.sock:ro # optional, for docker integrations
          - "{{ docker_nas_dir }}:/storage"
        restart_policy: unless-stopped
        networks:
          - name: proxy
        labels: "{{ labels | items2dict }}"
