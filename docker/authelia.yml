---
- name: Authelia
  vars:
    service: "authelia"
    service_port: "9091"
    service_labels:
      - key: "traefik.http.middlewares.authelia-cors.headers.customResponseHeaders.Access-Control-Allow-Origin"
        value: "https://homepage.{{ DOMAIN }}"
      - key: "traefik.http.middlewares.authelia-cors.headers.customResponseHeaders.Access-Control-Allow-Credentials"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.middlewares"
        value: "authelia-cors"

  hosts: all
  become: true
  vars_files:
    - ../vars/vault.yml
    - ../vars/traefik_labels.yml

  tasks:
    - name: Ensure homelab secrets directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.ansible/homelab-secrets"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: Load LLDAP admin password
      ansible.builtin.set_fact:
        lldap_admin_password: >-
          {{ lookup('password', lookup('env', 'HOME') +
             '/.ansible/homelab-secrets/lldap_admin_password chars=ascii_letters,digits length=32') }}
      no_log: true

    - name: Generate OIDC HMAC secret
      ansible.builtin.set_fact:
        authelia_oidc_hmac: >-
          {{ lookup('password', lookup('env', 'HOME') +
             '/.ansible/homelab-secrets/authelia_oidc_hmac chars=ascii_letters,digits length=64') }}
      no_log: true

    - name: Ensure authelia config dir exists
      ansible.builtin.file:
        path: "{{ docker_config_dir }}/{{ service }}"
        state: directory
        mode: "0700"

    - name: Generate OIDC RSA private key
      community.crypto.openssl_privatekey:
        path: "{{ docker_config_dir }}/{{ service }}/oidc_private.pem"
        type: RSA
        size: 4096
        mode: "0600"

    - name: Read OIDC private key
      ansible.builtin.slurp:
        src: "{{ docker_config_dir }}/{{ service }}/oidc_private.pem"
      register: authelia_oidc_private_key_raw
      no_log: true

    - name: Store OIDC private key content
      ansible.builtin.set_fact:
        authelia_oidc_private_key: "{{ authelia_oidc_private_key_raw.content | b64decode }}"
      no_log: true

    - name: Deploy authelia configuration
      ansible.builtin.template:
        src: ../local/authelia/configuration.yml
        dest: "{{ docker_config_dir }}/{{ service }}/configuration.yml"
        mode: "0600"
      notify: Restart authelia

    - name: Start authelia
      community.docker.docker_container:
        image: authelia/authelia:latest
        name: "{{ service }}"
        env:
          TZ: Europe/Amsterdam
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
        restart_policy: unless-stopped
        networks:
          - name: proxy
        labels: "{{ (traefik_public_labels + service_labels) | items2dict }}"

  handlers:
    - name: Restart authelia
      community.docker.docker_container:
        name: "{{ service }}"
        restart: true
        state: started
