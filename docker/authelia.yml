---
- name: Authelia
  vars:
    service: "authelia"
    labels:
      - key: "com.centurylinklabs.watchtower.enable"
        value: "true"
      - key: "traefik.enable"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.rule"
        value: "Host(`{{ service }}.{{ DOMAIN }}`)"
      - key: "traefik.http.routers.{{ service }}.service"
        value: "{{ service }}"
      - key: "traefik.http.routers.{{ service }}.entrypoints"
        value: "https"
      - key: "traefik.http.routers.{{ service }}.tls"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.tls.certresolver"
        value: "letsencrypt"
      - key: "traefik.http.services.{{ service }}.loadbalancer.server.port"
        value: "9091"

  hosts: all
  become: true
  vars_files:
    - ../vars/vars.yml
    - ../vars/vault.yml

  tasks:
    - name: Ensure authelia config dir exists
      ansible.builtin.file:
        path: "{{ docker_config_dir }}/{{ service }}"
        state: directory
        mode: "0700"

    - name: Deploy authelia configuration
      ansible.builtin.template:
        src: ../local/authelia/configuration.yml
        dest: "{{ docker_config_dir }}/{{ service }}/configuration.yml"
        mode: "0600"

    - name: Deploy authelia users database
      ansible.builtin.template:
        src: ../local/authelia/users_database.yml
        dest: "{{ docker_config_dir }}/{{ service }}/users_database.yml"
        mode: "0600"

    - name: Start authelia
      community.docker.docker_container:
        image: authelia/authelia:latest
        name: "{{ service }}"
        env:
          TZ: Europe/Amsterdam
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
        restart_policy: unless-stopped
        networks:
          - name: proxy
        labels: "{{ labels | items2dict }}"
