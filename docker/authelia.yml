---
- name: Authelia
  vars:
    service: "authelia"
    labels:
      - key: "traefik.enable"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.rule"
        value: "Host(`{{ service }}.{{ DOMAIN }}`)"
      - key: "traefik.http.routers.{{ service }}.service"
        value: "{{ service }}"
      - key: "traefik.http.routers.{{ service }}.entrypoints"
        value: "https"
      - key: "traefik.http.routers.{{ service }}.tls"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.tls.certresolver"
        value: "letsencrypt"
      - key: "traefik.http.services.{{ service }}.loadbalancer.server.port"
        value: "9091"

  hosts: all
  become: true
  vars_files:
    - ../vars/vars.yml
    - ../vars/vault.yml

  tasks:
    - name: Load LLDAP admin password
      ansible.builtin.set_fact:
        lldap_admin_password: "{{ lookup('password', lookup('env', 'HOME') + '/.ansible/homelab-secrets/lldap_admin_password chars=ascii_letters,digits length=32') }}"
      no_log: true

    - name: Generate OIDC HMAC secret
      ansible.builtin.set_fact:
        authelia_oidc_hmac: "{{ lookup('password', lookup('env', 'HOME') + '/.ansible/homelab-secrets/authelia_oidc_hmac chars=ascii_letters,digits length=64') }}"
      no_log: true

    - name: Generate WUD OIDC client secret
      ansible.builtin.set_fact:
        authelia_oidc_wud_secret: "{{ lookup('password', lookup('env', 'HOME') + '/.ansible/homelab-secrets/authelia_oidc_wud_secret chars=ascii_letters,digits length=32') }}"
      no_log: true

    - name: Derive WUD client secret bcrypt hash
      ansible.builtin.command:
        argv:
          - docker
          - run
          - --rm
          - authelia/authelia:latest
          - authelia
          - crypto
          - hash
          - generate
          - bcrypt
          - --password
          - "{{ authelia_oidc_wud_secret }}"
      register: wud_hash_output
      changed_when: false
      no_log: true

    - name: Store WUD client secret hash
      ansible.builtin.set_fact:
        authelia_oidc_wud_secret_hash: >-
          {{ wud_hash_output.stdout | regex_search('Digest: (\S+)', '\1') | first }}
      no_log: true

    - name: Ensure authelia config dir exists
      ansible.builtin.file:
        path: "{{ docker_config_dir }}/{{ service }}"
        state: directory
        mode: "0700"

    - name: Generate OIDC RSA private key
      community.crypto.openssl_privatekey:
        path: "{{ docker_config_dir }}/{{ service }}/oidc_private.pem"
        type: RSA
        size: 4096
        mode: "0600"

    - name: Read OIDC private key
      ansible.builtin.slurp:
        src: "{{ docker_config_dir }}/{{ service }}/oidc_private.pem"
      register: authelia_oidc_private_key_raw
      no_log: true

    - name: Store OIDC private key content
      ansible.builtin.set_fact:
        authelia_oidc_private_key: "{{ authelia_oidc_private_key_raw.content | b64decode }}"
      no_log: true

    - name: Deploy authelia configuration
      ansible.builtin.template:
        src: ../local/authelia/configuration.yml
        dest: "{{ docker_config_dir }}/{{ service }}/configuration.yml"
        mode: "0600"
      notify: Restart authelia

    - name: Start authelia
      community.docker.docker_container:
        image: authelia/authelia:latest
        name: "{{ service }}"
        env:
          TZ: Europe/Amsterdam
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
        restart_policy: unless-stopped
        networks:
          - name: proxy
        labels: "{{ labels | items2dict }}"

  handlers:
    - name: Restart authelia
      community.docker.docker_container:
        name: "{{ service }}"
        restart: true
        state: started
