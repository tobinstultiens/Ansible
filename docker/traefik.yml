---
- name: Traefik
  vars:
    service: "traefik"
    labels:
      - key: "traefik.enable"
        value: "true"
      - key: "traefik.http.middlewares.auth.basicauth.users"
        value: "{{ traefik_basic_auth }}"
      - key: "traefik.http.routers.{{ service }}.rule"
        value: "Host(`{{ service }}.{{ DOMAIN }}`)"
      - key: "traefik.http.routers.{{ service }}.service"
        value: "api@internal"
      - key: "traefik.http.routers.{{ service }}.middlewares"
        value: "auth"

  hosts: all
  become: true
  vars_files:
    - ../vars/vars.yml
    - ../vars/vault.yml

  tasks:
    - name: Generate Traefik basic auth hash
      ansible.builtin.command:
        argv:
          - htpasswd
          - -nbi
          - -m
          - "{{ traefik_user }}"
        stdin: "{{ traefik_password }}"
      register: traefik_basic_auth_command
      changed_when: false
      no_log: true

    - name: Store Traefik basic auth hash
      ansible.builtin.set_fact:
        # Traefik basic auth expects htpasswd-compatible hashes (MD5, SHA1, or bcrypt).
        traefik_basic_auth: "{{ traefik_basic_auth_command.stdout | trim }}"
      no_log: true

    - name: Ensures traefik dir exists
      ansible.builtin.file:
        path: "{{ traefik }}"
        state: directory
        mode: "0644"

    - name: Ensures acme.json file exists
      ansible.builtin.file:
        path: "{{ traefik }}/acme.json"
        state: touch
        mode: "0600"

    - name: Adding traefik.yml file
      ansible.builtin.template:
        src: ../local/traefik/traefik.yml
        dest: "{{ traefik }}/traefik.yml"
        mode: "0600"

    - name: Starting the reverse proxy.
      community.docker.docker_container:
        name: "{{ service }}"
        image: traefik:latest
        restart_policy: always
        state: started
        recreate: true
        ports:
          - "80:80"
          - "443:443"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - "{{ traefik }}/acme.json:/letsencrypt/acme.json"
          - "{{ traefik }}{{ traefik_file }}:/etc/traefik/traefik.yml"
        labels: "{{ labels | items2dict }}"
