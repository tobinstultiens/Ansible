---
- name: Gatus
  vars:
    service: "gatus"
    labels:
      - key: "traefik.enable"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.rule"
        value: "Host(`{{ service }}.{{ DOMAIN }}`)"
      - key: "traefik.http.routers.{{ service }}.service"
        value: "{{ service }}"
      - key: "traefik.http.routers.{{ service }}.entrypoints"
        value: "https"
      - key: "traefik.http.routers.{{ service }}.tls"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.tls.certresolver"
        value: "letsencrypt"
      - key: "traefik.http.routers.{{ service }}.middlewares"
        value: "authelia"
      - key: "traefik.http.services.{{ service }}.loadbalancer.server.port"
        value: "8080"

  hosts: all
  become: true
  vars_files:
    - ../vars/vars.yml
    - ../vars/vault.yml

  tasks:
    - name: Ensure gatus config dir exists
      ansible.builtin.file:
        path: "{{ docker_config_dir }}/{{ service }}"
        state: directory
        mode: "0755"

    - name: Deploy gatus configuration
      ansible.builtin.template:
        src: ../local/gatus/config.yaml
        dest: "{{ docker_config_dir }}/{{ service }}/config.yaml"
        mode: "0644"
      notify: Restart gatus

    - name: Start gatus
      community.docker.docker_container:
        image: twinproduction/gatus:latest
        name: "{{ service }}"
        env:
          TZ: Europe/Amsterdam
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
        restart_policy: unless-stopped
        networks:
          - name: proxy
        labels: "{{ labels | items2dict }}"

  handlers:
    - name: Restart gatus
      community.docker.docker_container:
        name: "{{ service }}"
        restart: true
        state: started
