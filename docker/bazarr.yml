---
- name: Bazarr
  vars:
    service: "bazarr"
    service_port: "6767"
    service_labels:
      - key: "autoheal-app"
        value: "true"
      - key: "wud.tag.include"
        value: '^v?\d+\.\d+\.\d+(\.\d+)?(-r\d+)?-ls\d+$'

  hosts: all
  vars_files:
    - ../vars/vault.yml
    - ../vars/traefik_labels.yml

  tasks:
    - name: Start Bazarr
      community.docker.docker_container:
        image: linuxserver/bazarr:v1.5.6-ls343
        name: "{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Amsterdam
        state: started
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
          - "{{ docker_nas_dir }}:/storage"
        network_mode: container:vpn
        restart_policy: unless-stopped
        labels: "{{ (traefik_default_labels + service_labels) | items2dict }}"
        healthcheck:
          test: bash -c 'echo > /dev/tcp/localhost/6767'
          interval: 30s
          timeout: 10s
          start_period: 60s
      register: bazarr_container

    - name: Wait for Bazarr to initialise and write config
      ansible.builtin.pause:
        seconds: 20
      when: bazarr_container.changed

    - name: Disable bazarr built-in authentication
      ansible.builtin.shell: |
        CONFIG="{{ docker_config_dir }}/{{ service }}/config/config.yaml"
        if sed -n '/^auth:/,/^[a-z]/p' "$CONFIG" | grep -qE '  type: (form|basic)'; then
          sed -i '/^auth:/,/^[a-z]/ s/^  type: .*/  type:/' "$CONFIG"
          echo changed
        fi
      register: bazarr_auth
      changed_when: "'changed' in bazarr_auth.stdout"
      notify: Restart bazarr

  handlers:
    - name: Restart bazarr
      community.docker.docker_container:
        name: "{{ service }}"
        restart: true
        state: started
