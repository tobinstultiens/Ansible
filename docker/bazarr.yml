---
- name: Bazarr
  vars:
    service: "bazarr"
    service_port: "6767"
    service_labels:
      - key: "autoheal-app"
        value: "true"
      - key: "wud.tag.include"
        value: '^v?\d+\.\d+\.\d+(\.\d+)?(-r\d+)?-ls\d+$'

  hosts: all
  vars_files:
    - ../vars/vault.yml
    - ../vars/traefik_labels.yml

  tasks:
    - name: Start Bazarr
      community.docker.docker_container:
        image: linuxserver/bazarr:v1.5.6-ls343
        name: "{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Amsterdam
        state: healthy
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
          - "{{ docker_nas_dir }}:/storage"
        network_mode: container:vpn
        restart_policy: unless-stopped
        labels: "{{ (traefik_default_labels + service_labels) | items2dict }}"
        healthcheck:
          test: bash -c 'echo > /dev/tcp/localhost/6767'
          interval: 30s
          timeout: 10s
          start_period: 60s
