---
- name: Lidarr
  vars:
    service: "lidarr"
    service_port: "8686"
    service_labels:
      - key: "autoheal-app"
        value: "true"
      - key: "wud.tag.include"
        value: '^v?\d+\.\d+\.\d+(\.\d+)?(-r\d+)?-ls\d+$'

  hosts: all
  vars_files:
    - ../vars/vault.yml
    - ../vars/traefik_labels.yml

  tasks:
    - name: Start lidarr
      community.docker.docker_container:
        image: linuxserver/lidarr:3.1.0.4875-ls23
        name: "{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Amsterdam
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
          - "{{ docker_nas_dir }}:/music"
          - "{{ docker_nas_dir }}/Download:/downloads"
        network_mode: container:vpn
        state: healthy
        restart_policy: unless-stopped
        labels: "{{ (traefik_default_labels + service_labels) | items2dict }}"
        healthcheck:
          test: bash -c 'echo > /dev/tcp/localhost/8686 && echo > /dev/tcp/1.1.1.1/443'
          interval: 30s
          timeout: 15s
          start_period: 60s

    - name: Set lidarr authentication to external
      ansible.builtin.replace:
        path: "{{ docker_config_dir }}/{{ service }}/config.xml"
        regexp: '<AuthenticationMethod>.*</AuthenticationMethod>'
        replace: '<AuthenticationMethod>External</AuthenticationMethod>'
      notify: Restart lidarr

  handlers:
    - name: Restart lidarr
      community.docker.docker_container:
        name: "{{ service }}"
        restart: true
        state: started
