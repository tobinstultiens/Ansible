---
- name: Qbittorrent
  vars:
    service: "qbittorrent"
    service_port: "4343"
    service_labels:
      - key: "autoheal-app"
        value: "true"

  hosts: all
  vars_files:
    - ../vars/vault.yml
    - ../vars/traefik_labels.yml

  tasks:
    - name: Start qbittorrent
      community.docker.docker_container:
        image: lscr.io/linuxserver/qbittorrent:latest
        name: "{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Amsterdam
          WEBUI_PORT: "4343"
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
          - "{{ docker_nas_dir }}/Download:/downloads"
        restart_policy: unless-stopped
        network_mode: container:vpn
        labels: "{{ (traefik_default_labels + service_labels) | items2dict }}"
        state: healthy
        healthcheck:
          test: bash -c 'echo > /dev/tcp/localhost/4343 && echo > /dev/tcp/1.1.1.1/443'
          interval: 30s
          timeout: 15s
          start_period: 60s
