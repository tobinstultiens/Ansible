---
- name: Calibre Web
  vars:
    service: "calibre-web"
    service_port: "8083"
    service_labels:
      - key: "wud.tag.include"
        value: '^v?\d+\.\d+\.\d+(\.\d+)?(-r\d+)?-ls\d+$'

  hosts: all
  vars_files:
    - ../vars/vault.yml
    - ../vars/traefik_labels.yml

  tasks:
    - name: Start calibre web
      community.docker.docker_container:
        image: lscr.io/linuxserver/calibre-web:0.6.26-ls377
        name: "{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "Europe/Amsterdam"
          DOCKER_MODS: "linuxserver/mods:universal-calibre" # optional
          OAUTHLIB_RELAX_TOKEN_SCOPE: "1" # optional
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
          - "{{ docker_nas_dir }}:/books"
        restart_policy: unless-stopped
        networks:
          - name: proxy
        labels: "{{ (traefik_default_labels + service_labels) | items2dict }}"
