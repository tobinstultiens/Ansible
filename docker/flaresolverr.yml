---
- name: Flaresolverr
  vars:
    service: "flaresolverr"
    labels:
      - key: "traefik.enable"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.rule"
        value: "Host(`{{ service }}.{{ DOMAIN }}`)"
      - key: "traefik.http.routers.{{ service }}.service"
        value: "{{ service }}"
      - key: "traefik.http.routers.{{ service }}.entrypoints"
        value: "https"
      - key: "traefik.http.routers.{{ service }}.tls"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.tls.certresolver"
        value: "letsencrypt"
      - key: "traefik.http.routers.{{ service }}.middlewares"
        value: "authelia"
      - key: "traefik.http.services.{{ service }}.loadbalancer.server.port"
        value: "8191"
      - key: "autoheal-app"
        value: "true"
      - key: "wud.tag.semver"
        value: "true"

  hosts: all
  vars_files:
    - ../vars/vars.yml
    - ../vars/vault.yml

  tasks:
    - name: Start Flaresolverr
      community.docker.docker_container:
        image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
        name: "{{ service }}"
        env:
          TZ: Europe/Amsterdam
        network_mode: container:vpn
        restart_policy: unless-stopped
        labels: "{{ labels | items2dict }}"
        state: healthy
        healthcheck:
          test: bash -c 'echo > /dev/tcp/localhost/8191'
          interval: 30s
          timeout: 10s
          start_period: 60s
