---
- name: Prowlarr
  vars:
    service: "prowlarr"
    labels:
      - key: "traefik.enable"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.rule"
        value: "Host(`{{ service }}.{{ DOMAIN }}`)"
      - key: "traefik.http.routers.{{ service }}.service"
        value: "{{ service }}"
      - key: "traefik.http.routers.{{ service }}.entrypoints"
        value: "https"
      - key: "traefik.http.routers.{{ service }}.tls"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.tls.certresolver"
        value: "letsencrypt"
      - key: "traefik.http.routers.{{ service }}.middlewares"
        value: "authelia"
      - key: "traefik.http.services.{{ service }}.loadbalancer.server.port"
        value: "9696"
      - key: "autoheal-app"
        value: "true"

  hosts: all
  vars_files:
    - ../vars/vars.yml
    - ../vars/vault.yml

  tasks:
    - name: Start prowlarr
      community.docker.docker_container:
        image: linuxserver/prowlarr:2.3.5.5327-ls141
        name: "{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Amsterdam
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
          - "{{ docker_nas_dir }}:/tv"
        restart_policy: unless-stopped
        network_mode: container:vpn
        state: healthy
        dns_opts:
          - options: "single-request"
        labels: "{{ labels | items2dict }}"
        healthcheck:
          test: bash -c 'echo > /dev/tcp/localhost/9696'
          interval: 30s
          timeout: 10s
          start_period: 60s

    - name: Set prowlarr authentication to external
      ansible.builtin.replace:
        path: "{{ docker_config_dir }}/{{ service }}/config.xml"
        regexp: '<AuthenticationMethod>.*</AuthenticationMethod>'
        replace: '<AuthenticationMethod>External</AuthenticationMethod>'
      notify: Restart prowlarr

  handlers:
    - name: Restart prowlarr
      community.docker.docker_container:
        name: "{{ service }}"
        restart: true
        state: started
