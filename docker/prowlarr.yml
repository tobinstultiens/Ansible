---
- name: Prowlarr
  vars:
    service: "prowlarr"
    service_port: "9696"
    service_labels:
      - key: "autoheal-app"
        value: "true"

  hosts: all
  vars_files:
    - ../vars/vault.yml
    - ../vars/traefik_labels.yml

  tasks:
    - name: Start prowlarr
      community.docker.docker_container:
        image: lscr.io/linuxserver/prowlarr:latest
        name: "{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Amsterdam
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
          - "{{ docker_nas_dir }}:/tv"
        restart_policy: unless-stopped
        network_mode: container:vpn
        state: healthy
        dns_opts:
          - options: "single-request"
        labels: "{{ (traefik_default_labels + service_labels) | items2dict }}"
        healthcheck:
          test: bash -c 'echo > /dev/tcp/localhost/9696 && echo > /dev/tcp/1.1.1.1/443'
          interval: 30s
          timeout: 15s
          start_period: 60s

    - name: Set prowlarr authentication to external
      ansible.builtin.replace:
        path: "{{ docker_config_dir }}/{{ service }}/config.xml"
        regexp: '<AuthenticationMethod>.*</AuthenticationMethod>'
        replace: '<AuthenticationMethod>External</AuthenticationMethod>'
      notify: Restart prowlarr

  handlers:
    - name: Restart prowlarr
      community.docker.docker_container:
        name: "{{ service }}"
        restart: true
        state: started
