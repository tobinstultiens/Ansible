---
- name: Ombi
  vars:
    service: "ombi"
    service_port: "3579"
    service_labels:
      - key: "traefik.http.middlewares.{{ service }}.headers.SSLRedirect"
        value: "true"
      - key: "traefik.http.middlewares.{{ service }}.headers.STSSeconds"
        value: "315360000"
      - key: "traefik.http.middlewares.{{ service }}.headers.browserXSSFilter"
        value: "true"
      - key: "traefik.http.middlewares.{{ service }}.headers.contentTypeNosniff"
        value: "true"
      - key: "traefik.http.middlewares.{{ service }}.headers.forceSTSHeader"
        value: "true"
      - key: "traefik.http.middlewares.{{ service }}.headers.SSLHost"
        value: ""
      - key: "traefik.http.middlewares.{{ service }}.headers.STSIncludeSubdomains"
        value: "true"
      - key: "traefik.http.middlewares.{{ service }}.headers.STSPreload"
        value: "true"
      - key: "traefik.http.middlewares.{{ service }}.headers.frameDeny"
        value: "true"
      - key: "traefik.http.routers.{{ service }}.middlewares"
        value: "authelia,{{ service }}"
      - key: "traefik.docker.network"
        value: "proxy"
      - key: "autoheal-app"
        value: "true"
      - key: "wud.tag.include"
        value: '^v?\d+\.\d+\.\d+(\.\d+)?(-r\d+)?-ls\d+$'

  hosts: all
  vars_files:
    - ../vars/vault.yml
    - ../vars/traefik_labels.yml

  tasks:
    - name: Start ombi
      community.docker.docker_container:
        image: lscr.io/linuxserver/ombi:v4.53.4-ls249
        name: "{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "Europe/Amsterdam"
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
        restart_policy: unless-stopped
        network_mode: container:vpn
        state: healthy
        labels: "{{ (traefik_public_labels + service_labels) | items2dict }}"
        healthcheck:
          test: bash -c 'echo > /dev/tcp/localhost/3579'
          interval: 30s
          timeout: 10s
          start_period: 60s
