---
- name: Purgarr
  vars:
    service: "purgarr"
    service_port: "9891"
    service_labels:
      - key: "wud.watch"
        value: "false"

  hosts: all
  vars_files:
    - ../vars/vault.yml
    - ../vars/traefik_labels.yml

  tasks:
    - name: Start Purgarr
      community.docker.docker_container:
        image: ghcr.io/steveharsant/purgarr:latest
        name: "{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          QBIT_URL: "vpn:4343"
          QBIT_PASSWORD: "{{ QBT_PASS }}"
          SONARR_URL: "https://sonarr.{{ DOMAIN }}"
          SONARR_API_KEY: "{{ sonarr_apikey }}"
          RADARR_URL: "https://radarr.{{ DOMAIN }}"
          RADARR_API_KEY: "{{ radarr_apikey }}"
        state: started
        restart_policy: unless-stopped
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
          - "{{ docker_nas_dir }}:/storage"
        networks:
          - name: proxy
        labels: "{{ (traefik_default_labels + service_labels) | items2dict }}"
