---
- name: Calibre
  vars:
    service: "calibre"
    service_port: "8080"
    service_labels:
      - key: "autoheal-app"
        value: "true"
      - key: "wud.tag.include"
        value: '^v?\d+\.\d+\.\d+(\.\d+)?(-r\d+)?-ls\d+$'

  hosts: all
  vars_files:
    - ../vars/vault.yml
    - ../vars/traefik_labels.yml

  tasks:
    - name: Start calibre
      community.docker.docker_container:
        image: linuxserver/calibre:v9.6.0-ls394
        name: "{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Amsterdam
          CUSTOM_HTTPS_PORT: "8213"
        volumes:
          - "{{ docker_config_dir }}/{{ service }}:/config"
          - "{{ docker_nas_dir }}:/books"
        restart_policy: unless-stopped
        network_mode: container:vpn
        labels: "{{ (traefik_default_labels + service_labels) | items2dict }}"
        healthcheck:
          test: bash -c 'echo > /dev/tcp/localhost/8080'
          interval: 30s
          timeout: 10s
          start_period: 60s
