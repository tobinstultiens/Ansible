---
- name: Tdarr
  vars:
    service: "tdarr"
    service_port: "8265"
    service_labels:
      - key: "wud.watch.digest"
        value: "true"

  hosts: home
  vars_files:
    - ../vars/vault.yml
    - ../vars/traefik_labels.yml

  tasks:
    - name: Start tdarr
      community.docker.docker_container:
        image: ghcr.io/haveagitgat/tdarr:2.71.01
        name: "{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Amsterdam
          UMASK_SET: "002"
          serverIP: "0.0.0.0"
          serverPort: "8266"
          webUIPort: "8265"
          internalNode: "true"
          inContainer: "true"
          nodeName: "MyInternalNode"
          auth: "true"
          # apiKey: "{{ tdarr_apikey }}"
        devices:
          - "/dev/dri:/dev/dri"
        volumes:
          - "{{ docker_config_dir }}/{{ service }}/server:/app/server"
          - "{{ docker_config_dir }}/{{ service }}/config:/app/configs"
          - "{{ docker_config_dir }}/{{ service }}/logs:/app/logs"
          - "{{ home }}/tmp/tdarr:/temp"
          - "{{ docker_nas_dir }}:/media"
        restart_policy: unless-stopped
        ports: 8266:8266
        networks:
          - name: proxy
        labels: "{{ (traefik_default_labels + service_labels) | items2dict }}"

    - name: Start tdarr node.
      community.docker.docker_container:
        name: "{{ service }}-node"
        image: ghcr.io/haveagitgat/tdarr_node:2.71.01
        network_mode: "container:{{ service }}"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Amsterdam
          UMASK_SET: "002"
          nodeName: MyExternalNode
          serverIP: "0.0.0.0"
          serverPort: "8266"
          inContainer: "true"
          # apiKey: "{{ tdarr_apikey }}"
        devices:
          - "/dev/dri:/dev/dri"
        volumes:
          - "{{ docker_config_dir }}/{{ service }}/config:/app/configs"
          - "{{ docker_config_dir }}/{{ service }}/logs:/app/logs"
          - "{{ home }}/tmp/tdarr:/temp"
          - "{{ docker_nas_dir }}:/media"
        restart_policy: unless-stopped
        labels:
          {
            "wud.watch.digest": "true"
          }
