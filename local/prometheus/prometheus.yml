# my global config
global:
  scrape_interval: 1m
  evaluation_interval: 30s
  label_name_length_limit: 200
  # scrape_timeout is set to the global default (10s).

runtime:
  gogc: 75

rule_files:
  - "first.rules"
  - "my/*.rules"

scrape_configs:
  - job_name: prometheus

    honor_labels: true
  - job_name: docker
    sample_limit: 0
    body_size_limit: 0
    label_limit: 0
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      # Keep only containers opted into scraping
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        regex: 'true'
        action: keep
      # Override port if prometheus.port label is set
      - source_labels: [__address__, __meta_docker_container_label_prometheus_port]
        regex: '([^:]+)(?::\d+)?;(\d+)'
        replacement: '$1:$2'
        target_label: __address__
      # Set container_name label
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container_name
        replacement: '$1'
    metric_relabel_configs:
      # Drop verbose OCI image metadata labels copied by cAdvisor
      - regex: 'container_label_.*'
        action: labeldrop
