---
theme: auto

server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: info

totp:
  issuer: '{{ DOMAIN }}'

identity_validation:
  reset_password:
    jwt_secret: '{{ authelia_jwt_secret }}'

authentication_backend:
  ldap:
    implementation: lldap
    address: 'ldap://lldap:3890'
    base_dn: 'dc={{ DOMAIN | replace(".", ",dc=") }}'
    user: 'uid=admin,ou=people,dc={{ DOMAIN | replace(".", ",dc=") }}'
    password: '{{ lldap_admin_password }}'

access_control:
  networks:
    - name: docker
      networks: '172.16.0.0/12'
  default_policy: two_factor
  rules:
    - domain: '*.{{ DOMAIN }}'
      networks:
        - docker
      policy: bypass
    - domain:
        - 'sonarr.{{ DOMAIN }}'
        - 'radarr.{{ DOMAIN }}'
        - 'lidarr.{{ DOMAIN }}'
        - 'prowlarr.{{ DOMAIN }}'
        - 'bazarr.{{ DOMAIN }}'
        - 'tdarr.{{ DOMAIN }}'
      subject:
        - 'group:admins'
        - 'group:media'
      policy: two_factor
    - domain:
        - 'sonarr.{{ DOMAIN }}'
        - 'radarr.{{ DOMAIN }}'
        - 'lidarr.{{ DOMAIN }}'
        - 'prowlarr.{{ DOMAIN }}'
        - 'bazarr.{{ DOMAIN }}'
        - 'tdarr.{{ DOMAIN }}'
      policy: deny

session:
  secret: '{{ authelia_session_secret }}'
  cookies:
    - name: authelia_session
      domain: '{{ DOMAIN }}'
      authelia_url: 'https://authelia.{{ DOMAIN }}'
      default_redirection_url: 'https://{{ DOMAIN }}'
      expiration: 30d
      inactivity: 7d
      remember_me: 90d

storage:
  encryption_key: '{{ authelia_storage_key }}'
  local:
    path: /config/db.sqlite3

notifier:
  smtp:
    address: 'smtp://{{ authelia_smtp_host }}:{{ authelia_smtp_port }}'
    username: '{{ authelia_smtp_username }}'
    password: '{{ authelia_smtp_password }}'
    sender: 'Authelia <{{ authelia_smtp_username }}>'
