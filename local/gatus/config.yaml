    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Tdarr
    group: Media
    url: http://tdarr:8265
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Calibre
    group: Media
    url: https://calibre.{{ DOMAIN }}
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Calibre Web
    group: Media
    url: http://calibre-web:8083
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Ombi
    group: Media
    url: https://ombi.{{ DOMAIN }}
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Purgarr
    group: Media
    url: http://purgarr:9891
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  # Home
  - name: Home Assistant
    group: Home
    url: http://homeassistant:8123
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Grocy
    group: Home
    url: http://grocy:80
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Cooking
    group: Home
    url: http://cooking:80
    interval: 2m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord
