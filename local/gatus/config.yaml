web:
  port: 8080

storage:
  type: sqlite
  path: /config/data.db

alerting:
  discord:
    webhook-url: "{{ gatus_discord_webhook }}"
    default-alert:
      failure-threshold: 3
      success-threshold: 1
      send-on-resolved: true

endpoints:
  # Infrastructure
  - name: Authelia
    group: Infrastructure
    url: http://authelia:9091/api/health
    interval: 2m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: LLDAP
    group: Infrastructure
    url: http://lldap:17170
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Traefik
    group: Infrastructure
    url: http://traefik:8080/ping
    interval: 2m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: Grafana
    group: Infrastructure
    url: http://grafana:3000/api/health
    interval: 2m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: Prometheus
    group: Infrastructure
    url: https://prometheus.{{ DOMAIN }}
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Homepage
    group: Infrastructure
    url: http://homepage:3000
    interval: 2m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: WUD
    group: Infrastructure
    url: http://wud:3000
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Node Exporter
    group: Infrastructure
    url: http://node-exporter:9100/metrics
    interval: 2m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: cAdvisor
    group: Infrastructure
    url: http://cadvisor:8080/healthz
    interval: 2m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: Loki
    group: Infrastructure
    url: http://loki:3100/ready
    interval: 2m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: Flaresolverr
    group: Infrastructure
    url: http://vpn:8191
    interval: 2m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  # Connectivity
  - name: Internet
    group: Connectivity
    url: https://1.1.1.1
    interval: 2m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: NAS
    group: Connectivity
    url: tcp://{{ nas_ip }}:445
    interval: 2m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord

  # Certificates
  - name: Authelia TLS
    group: Certificates
    url: https://authelia.{{ DOMAIN }}
    interval: 1h
    conditions:
      - "[STATUS] < 400"
      - "[CERTIFICATE_EXPIRATION] > 14d"
    alerts:
      - type: discord

  - name: Jellyfin TLS
    group: Certificates
    url: https://jellyfin.{{ DOMAIN }}
    interval: 1h
    conditions:
      - "[STATUS] < 400"
      - "[CERTIFICATE_EXPIRATION] > 14d"
    alerts:
      - type: discord

  - name: Grafana TLS
    group: Certificates
    url: https://grafana.{{ DOMAIN }}
    interval: 1h
    conditions:
      - "[STATUS] < 400"
      - "[CERTIFICATE_EXPIRATION] > 14d"
    alerts:
      - type: discord

  # Media
  - name: Jellyfin
    group: Media
    url: http://jellyfin:8096
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Sonarr
    group: Media
    url: https://sonarr.{{ DOMAIN }}
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Radarr
    group: Media
    url: https://radarr.{{ DOMAIN }}
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord

  - name: Lidarr
    group: Media
    url: https://lidarr.{{ DOMAIN }}
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
      - type: discord


  - name: Prowlarr
    group: Media
    url: https://prowlarr.{{ DOMAIN }}
    interval: 2m
    conditions:
      - "[STATUS] >= 200"
      - "[STATUS] < 400"
    alerts:
