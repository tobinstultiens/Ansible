---
- name: Setup
  hosts: all
  become: true
  roles:
    - docker

  vars_files: vars/vault.yml

  tasks:
    - name: Run the equivalent of "pacman -Sy" as a separate step
      ansible.builtin.package:
        update_cache: true

    - name: Ensure sshfs is installed.
      ansible.builtin.package:
        name: sshfs
        state: present

    - name: Ensure NAS mount point directory exists
      ansible.builtin.file:
        path: "{{ docker_nas }}"
        state: directory
        mode: "0755"

      # Run sshfs locally on the machine TODO: Look into doing this automatically

    - name: Configure NAS SSHFS mount in fstab
      ansible.posix.mount:
        path: "{{ docker_nas }}"
        src: "{{ nas_user }}@{{ nas_ip }}:/"
        fstype: fuse.sshfs
        opts: "noauto,x-systemd.automount,_netdev,reconnect,identityfile=/home/tobins/.ssh/id_ed25519,allow_other,default_permissions"
        boot: false
        state: present
      notify: Reload systemd daemon
      register: nas_mount

    - name: Reboot if NAS mount changed
      ansible.builtin.reboot:
      when: nas_mount.changed

  handlers:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
